spring.application.name=dobby-core
spring.threads.virtual.enabled=true
spring.config.import=optional:file:.env[.properties]
management.endpoints.web.exposure.include=logfile
logging.file.name=logs/dobby.log

#Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

# Gemini API
gemini.api.key=${GEMINI_API_KEY}
gemini.prompt.file=ai_prompt.txt

# Dobby Bot
discord.client.id=${DISCORD_CLIENT_ID}
discord.client.secret=${DISCORD_CLIENT_SECRET}
discord.redirect.uri=${DISCORD_REDIRECT_URI}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Dev Secret Key
dev.secret.key=${SECERTE_DEV_KEY}

# Frontend
frontend.url=${FRONTEND_URL}

# Backend API key
app.security.api-key-header=${BACKEND_API_HEADER}
app.security.api-key-secret=${BACKEND_API_KEY}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}